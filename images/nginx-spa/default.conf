# SPA fallback + pre-compressed asset delivery.
# Consumer Dockerfiles should COPY their built static bundle to
# /usr/share/nginx/html and leave this config in place, OR mount their
# own server block at /etc/nginx/conf.d/default.conf.

server {
    listen       8080 default_server;
    listen       [::]:8080 default_server;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Serve pre-compressed gzip bundles if present — saves CPU and bytes
    # on every request. Build tools (vite, webpack, etc.) emit *.gz
    # alongside each asset.
    #
    # Note: brotli_static is intentionally NOT enabled. The upstream
    # nginx:alpine binary doesn't ship with the ngx_brotli module, so
    # referencing the directive would crash the worker at startup. If you
    # need brotli, swap the base image to one that bundles ngx_brotli
    # (or a custom-compiled nginx) and add `brotli_static on;` back here.
    gzip_static on;

    # SPA: anything that isn't a real file falls back to /index.html so
    # client-side routing works on deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived immutable hashed assets — cache hard.
    location ~* \.(?:css|js|woff2|woff|ttf|eot|otf|ico|svg|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Belt-and-suspenders security headers. Consumers can override with
    # their own server block if they need a tighter CSP.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Don't leak the server version banner.
    server_tokens off;
}
