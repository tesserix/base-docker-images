name: Weekly base-image rebuild

# Rebuilds every tesserix base image every Saturday at 03:00 UTC, which
# is after Alpine + Debian + the language distros have typically pushed
# their weekend patch releases. We re-pull upstream images with
# `docker build --pull` so a month-stale apk cache doesn't mask a CVE
# that was already fixed upstream.
#
# Runs that don't pass Trivy CRITICAL+HIGH are NOT published — we'd
# rather let the old image keep serving traffic than push a known-bad
# image and have every downstream consumer roll to it.

on:
  schedule:
    - cron: "0 3 * * 6"    # every Saturday, 03:00 UTC
  workflow_dispatch:        # manual fire-now button
    inputs:
      images:
        description: 'Comma-separated subset, or "all"'
        default: "all"
        required: false
      push:
        description: 'Push to GHCR (false for a dry run)'
        type: boolean
        default: true
        required: false
  push:
    branches: [main]
    paths:
      - "images/**"
      - ".github/workflows/weekly-rebuild.yml"

permissions:
  contents: read
  packages: write     # push to ghcr.io
  id-token: write     # cosign keyless signing via OIDC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # weekly runs should NOT cancel each other

jobs:
  build-matrix:
    name: Build & scan ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - go-builder
          - alpine-runtime
          - node-builder-22
          - node-runtime-22
          - node-builder-24
          - node-runtime-24
          - nginx-spa
          - python-runtime-3.13
          - debian-runtime
          - distroless-static
    steps:
      - uses: actions/checkout@v6

      - name: Compute build metadata
        id: meta
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=$(git rev-parse --short=12 HEAD)
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          # Three tags: immutable date, moving weekly, and latest alias
          echo "tags=ghcr.io/tesserix/base-${{ matrix.image }}:$DATE,ghcr.io/tesserix/base-${{ matrix.image }}:weekly,ghcr.io/tesserix/base-${{ matrix.image }}:latest,ghcr.io/tesserix/base-${{ matrix.image }}:sha-$SHA" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build BUT DON'T push yet — we want Trivy to gate the push so
      # nothing reaches the registry until it's scanned clean.
      - name: Build (load locally)
        uses: docker/build-push-action@v6
        with:
          context: images/${{ matrix.image }}
          file: images/${{ matrix.image }}/Dockerfile
          push: false
          load: true
          pull: true
          tags: ghcr.io/tesserix/base-${{ matrix.image }}:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          provenance: false

      - name: Trivy scan (fail on CRITICAL + HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/tesserix/base-${{ matrix.image }}:sha-${{ steps.meta.outputs.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          trivyignores: .trivyignore

      - name: Push (post-scan)
        if: github.event_name != 'workflow_dispatch' || inputs.push == true
        uses: docker/build-push-action@v6
        with:
          context: images/${{ matrix.image }}
          file: images/${{ matrix.image }}/Dockerfile
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          provenance: false
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.date }}

      - name: Summary
        if: always()
        run: |
          echo "### base-${{ matrix.image }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`ghcr.io/tesserix/base-${{ matrix.image }}:${{ steps.meta.outputs.date }}\` | immutable |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`ghcr.io/tesserix/base-${{ matrix.image }}:weekly\` | moving |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`ghcr.io/tesserix/base-${{ matrix.image }}:latest\` | alias of weekly |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`ghcr.io/tesserix/base-${{ matrix.image }}:sha-${{ steps.meta.outputs.sha }}\` | git-anchored |" >> "$GITHUB_STEP_SUMMARY"

  # Fires when the Trivy gate in any matrix leg came back red. The gate
  # already fails that matrix leg on its own (exit-code: "1") and the
  # image is NOT published — this job is the fan-out to the security
  # distribution list so a red weekly run surfaces immediately rather
  # than waiting for someone to notice the following Monday.
  notify-security-failure:
    name: Notify — base-image security gate failed
    needs: [build-matrix]
    if: ${{ always() && needs.build-matrix.result == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send email alert
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[SECURITY] tesserix base-images — weekly rebuild failed"
          from: "Tesserix Security <${{ secrets.SMTP_USERNAME }}>"
          to: samyak.rout@gmail.com, mahesh.sangawar@gmail.com, unidevidp@gmail.com
          body: |
            The weekly base-image rebuild failed the Trivy CRITICAL+HIGH gate.
            No image was published — downstream consumers keep serving the
            previous weekly tag.

            Workflow : ${{ github.workflow }}
            Run      : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Trigger  : ${{ github.event_name }}
            Branch   : ${{ github.ref_name }}
            Commit   : ${{ github.sha }}

            Open the failing matrix leg in the run above for the CVE list.
            Patch the base Dockerfile (or add a documented waiver to
            .trivyignore) and re-run.

  # Optional: fan-out a rebuild event to downstream consumer repos so
  # their Dockerfiles re-pull the fresh base without waiting for a
  # manual push. Opt-in via the `consumers` list below.
  notify-consumers:
    name: Notify consumer repos to rebuild
    needs: [build-matrix]
    if: github.event_name == 'schedule' && success()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger downstream weekly rebuild
        env:
          GH_TOKEN: ${{ secrets.TESSERIX_K8S_BOT }}
        run: |
          set -e
          # Add repositories here as they adopt the base images. Each
          # consumer needs a matching workflow with
          # `on: repository_dispatch: types: [base-image-refresh]`.
          consumers=(
            "tesserix/FanZone-Battle-Ground"
            "tesserix/mark8ly"
            "tesserix/Home-Chef-App"
          )
          for repo in "${consumers[@]}"; do
            echo "::notice::dispatching base-image-refresh to $repo"
            gh api -X POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/$repo/dispatches" \
              -f event_type=base-image-refresh \
              || echo "::warning::$repo has not opted-in yet"
          done
